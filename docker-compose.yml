
services:
  # ── MongoDB ───────────────────────────────────────────────────────────────────
  mongo:
    image: mongo:7
    container_name: urbackend_mongo
    restart: unless-stopped
    volumes:
      - mongo_data:/data/db

  # ── Redis ─────────────────────────────────────────────────────────────────────
  redis:
    image: redis:latest
    container_name: urbackend_redis
    restart: unless-stopped
    volumes:
      - redis_data:/data

  # ── Dashboard API (Admin Server) ─────────────────────────────────────────────
  dashboard-api:
    build:
      context: .
      dockerfile: ./apps/dashboard-api/Dockerfile
    container_name: urbackend_dashboard
    restart: unless-stopped
    ports:
      - '1234:1234'
    depends_on:
      - mongo
      - redis
    env_file:
      - path: .env
        required: false
    environment:
      # Override DB URLs to use Docker service names
      MONGO_URL: mongodb://mongo:27017/urbackend
      REDIS_URL: redis://redis:6379
      NODE_ENV: production
      PORT: 1234

  # ── Public API (User Server) ──────────────────────────────────────────────────
  public-api:
    build:
      context: .
      dockerfile: ./apps/public-api/Dockerfile
    container_name: urbackend_public
    restart: unless-stopped
    ports:
      - '1235:1235'
    depends_on:
      - mongo
      - redis
    env_file:
      - path: .env
        required: false
    environment:
      MONGO_URL: mongodb://mongo:27017/urbackend
      REDIS_URL: redis://redis:6379
      NODE_ENV: production
      USER_PORT: 1235

volumes:
  mongo_data:
  redis_data:
